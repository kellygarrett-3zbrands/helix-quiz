<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:linear-gradient(160deg,#EAEAEA 16%,#A3B8CB 92%);min-height:100vh;color:#2E3339}
.hdr{background:linear-gradient(160deg,#EAEAEA 16%,#A3B8CB 92%);border-bottom:1.5px solid #fff;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:100}
.close-btn{width:36px;height:36px;border-radius:50%;background:#002E66;border:none;cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}
.bottom-nav{background:#FFFFFF;border-top:1px solid #e5e7eb;height:96px;display:flex;justify-content:center;align-items:center;gap:12px;position:sticky;bottom:0;z-index:100}
.btn-back{height:48px;width:56px;border-radius:11px;border:2px solid #002E66;background:#FFFFFF;cursor:pointer;color:#002E66;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-back:disabled{opacity:.3;cursor:not-allowed}
.btn-next{background:#002E66;color:#FFFFFF;border:none;border-radius:11px;height:48px;width:300px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
#quiz-screen{display:flex;flex-direction:column;min-height:calc(100vh - 61px)}
.quiz-body{flex:1;display:flex;gap:40px;align-items:flex-start;justify-content:center;padding:40px;max-width:1100px;margin:0 auto;width:100%}
.q-panel{background:#FFFFFF;border-radius:14px;padding:24px;width:360px;flex-shrink:0}
.q-counter{font-size:12px;font-weight:600;color:#444;margin-bottom:8px}
.prog-track{height:5px;background:#e2e8f0;border-radius:3px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#002E66 0%,#94a3b8 100%);transition:width .3s}
.q-title{font-size:22px;font-weight:800;line-height:1.25;color:#2E3339;margin-bottom:10px}
.q-sub{font-size:13px;color:#444;line-height:1.55;margin-bottom:18px}
.compare-card{background:#F1F1F1;border-radius:11px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cc-title{font-size:13px;font-weight:700;color:#2E3339;margin-bottom:4px}
.cc-sub{font-size:12px;color:#444;line-height:1.45}
.info-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#444;flex-shrink:0;margin-top:1px}
.q-footer{border-top:1px solid #e5e7eb;padding-top:14px;display:flex;gap:28px}
.footer-btn{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#002E66;cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;font-family:'Nunito Sans',sans-serif}
.opts-panel{flex:1;display:flex;flex-direction:column;gap:10px}
.opt-card{background:#FFFFFF;border:none;border-radius:11px;padding:16px;cursor:pointer;display:grid;grid-template-columns:1fr 28px;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);min-height:98px;outline:2px solid transparent;outline-offset:0;transition:outline-color .15s}
.opt-card:hover{outline-color:#94a3b8}
.opt-card.selected{outline-color:#002E66}
.opt-title{font-size:15px;font-weight:700;color:#2E3339;margin-bottom:4px}
.opt-desc{font-size:13px;color:#444;line-height:1.4}
.opt-check{width:22px;height:22px;border-radius:5px;background:#002E66;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;justify-self:end}
.opt-card.selected .opt-check{opacity:1}
.opt-check svg{width:12px;height:12px;display:block}
#result-screen{display:none;min-height:calc(100vh - 61px);padding-bottom:96px}
.res-kicker{font-size:13px;color:#444;margin-bottom:4px}
.res-headline{font-size:30px;font-weight:800;color:#2E3339}
.res-headline em{font-family:'Libre Baskerville',serif;font-style:italic;font-weight:400}
.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:0 28px 24px;align-items:start}
.mat-card{background:#FFFFFF;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;display:flex;flex-direction:column;height:fit-content}
.mat-card.primary{border:2px solid #002E66}
.card-img{width:100%;height:240px;object-fit:cover;display:block;background:#d4dce6}
.card-header{padding:16px 20px;border-bottom:1px solid #F1F1F1}
.card-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-kicker{font-size:11px;color:#444}
.badge{font-size:11px;font-weight:700;padding:0 14px;border-radius:11px;display:inline-flex;align-items:center;height:37px;line-height:1;white-space:nowrap}
.badge-primary{background:linear-gradient(90deg,#81ADDA 0%,#2E3339 100%);color:#FFFFFF}
.badge-secondary{background:#F1F1F1;color:#444;border:1px solid #e2e8f0}
.card-name{font-size:20px;font-weight:800;color:#2E3339;line-height:1.2;margin-bottom:6px}
.card-name em{font-family:'Libre Baskerville',serif;font-style:italic;font-weight:400}
.stars-row{display:flex;align-items:center;gap:5px}
.stars{color:#f59e0b;font-size:13px}
.review-link{font-size:12px;font-weight:600;color:#002E66;text-decoration:underline;cursor:pointer}
.why-section{padding:16px 20px;border-bottom:1px solid #F1F1F1}
.why-head{font-size:13px;font-weight:700;color:#2E3339;margin-bottom:12px}
.why-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.why-item:last-child{margin-bottom:0}
.wi-icon{width:22px;height:22px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.wi-icon svg{width:11px;height:11px}
.wi-title{font-size:13px;font-weight:700;color:#2E3339;line-height:1.3}
.wi-desc{font-size:12px;color:#444;line-height:1.45;margin-top:2px}
.acc-toggle{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;font-size:12px;font-weight:700;color:#2E3339;cursor:pointer;background:#FFFFFF;border-top:none;border-bottom:1px solid #F1F1F1;user-select:none}
.acc-arrow{font-size:12px;color:#444;transition:transform .2s}
.acc-body{display:none;background:#FFFFFF;border-bottom:1px solid #e2e8f0}
.acc-body.open{display:block}
.acc-profile{font-size:11px;font-weight:600;color:#444;padding:10px 20px 6px}
.layer-img{width:100%;display:none;border-bottom:1px solid #F1F1F1;background:#fff;object-fit:contain}
.acc-body.open .layer-img{display:block}
.acc-layer{padding:8px 20px}
.acc-layer:nth-child(odd){background:#F1F1F1}
.acc-layer:nth-child(even){background:#FFFFFF}
.acc-layer-name{font-size:12px;font-weight:700;color:#2E3339;margin-bottom:2px}
.acc-layer-desc{font-size:11px;color:#444;line-height:1.4}
.trust-row{display:flex;justify-content:space-between;padding:12px 20px;background:#FFFFFF;border-top:1px solid #F1F1F1}
.trust-item{text-align:center}
.trust-val{font-size:11px;font-weight:700;color:#2E3339;display:block}
.trust-label{font-size:10px;color:#444;display:block;margin-top:1px}
.price-row{padding:14px 20px;border-top:1px solid #F1F1F1;background:#FFFFFF;display:flex;justify-content:space-between;align-items:flex-start}
.price-starting{font-size:10px;color:#444;display:block;margin-bottom:2px}
.price-main{font-size:15px;font-weight:800;color:#2E3339;display:block}
.price-was{font-size:11px;color:#94a3b8;text-decoration:line-through;display:block;margin-top:1px}
.price-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.shop-btn{background:#002E66;color:#FFFFFF;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif}
.price-link{font-size:11px;font-weight:600;color:#002E66;text-decoration:underline;cursor:pointer}

</head>

var PROFILES={Core:'11" profile',Luxe:'13.5" profile',Elite:'15" profile'};
var answers={},cur=0,lastResult=null;

function render(){
  var q=Qs[cur];
  document.getElementById('q-counter').textContent='Question '+(cur+1)+' of '+Qs.length;
  document.getElementById('prog-fill').style.width=(((cur+1)/Qs.length)*100)+'%';
  document.getElementById('q-title').textContent=q.title;
  document.getElementById('q-sub').textContent=q.sub;
  var panel=document.getElementById('opts-panel');panel.innerHTML='';
  q.opts.forEach(function(o){
    var d=document.createElement('div');d.className='opt-card'+(answers[q.id]===o.val?' selected':'');
    var inner=document.createElement('div');
    var t=document.createElement('div');t.className='opt-title';t.textContent=o.label;
    var s=document.createElement('div');s.className='opt-desc';s.textContent=o.desc;
    inner.appendChild(t);inner.appendChild(s);
    var box=document.createElement('div');box.className='opt-check';
    box.innerHTML='<svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>';
    d.appendChild(inner);d.appendChild(box);
    d.onclick=function(){answers[q.id]=o.val;render();};
    panel.appendChild(d);
  });
  document.getElementById('btn-back').disabled=cur===0;
  document.getElementById('btn-next').disabled=!answers[q.id];
  document.getElementById('btn-next').textContent=cur===Qs.length-1?'See my result':'Next';
}
function goNext(){if(!answers[Qs[cur].id])return;if(cur<Qs.length-1){cur++;render();}else{showResult();}}
function goBack(){if(cur>0){cur--;render();}}

function calcResult(){
  var q1=answers.q1,q2=answers.q2,q3=answers.q3,q4=answers.q4,q5=answers.q5;
  var tier=q5==='I want the best of the best'?'Elite':q3==='Often'?'Luxe':'Core';
  var pos=(q1==='Side'||q1==='Toss and Turn')?'side':'back';
  var baseMap={side:{Soft:'Sunset',Medium:'Midnight',Firm:'Twilight'},back:{Soft:'Moonlight',Medium:'Dusk',Firm:'Dawn'}};
  return{tier:tier,base:baseMap[pos][q2],q1:q1,q2:q2,q3:q3,q4:q4,q5:q5,
    showTemp:['Every night','Most nights','Sometimes'].indexOf(q4)>-1,
    showBackPain:['Sometimes','Often'].indexOf(q3)>-1,
    showBudget:q5==='I want the best of the best'};
}

function getCopy(m,t,cat,ans){return COPY[m+'_'+t+'_'+cat+'_'+ans]||null;}
function posKey(q1){return q1==='Toss and Turn'?'Toss and Turn':q1;}

var pillBase='display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:8px 14px;border-radius:100px;margin-top:6px;font-family:\'Nunito Sans\',sans-serif;';
var pillGrad=pillBase+'background:linear-gradient(90deg,#81ADDA 0%,#2E3339 100%);color:#FFFFFF;';
var pillLight=pillBase+'background:#F1F1F1;border:1px solid #e2e8f0;color:#2E3339;';

function tempPill(tier,primary){
  if(tier==='Elite')return primary?'+ GlacioTex Cover + CoolForce Layer included':'+ GlacioTex + CoolForce included';
  if(tier==='Luxe')return primary?'+ GlacioTex Cooling Cover upgrade available':'+ GlacioTex upgrade available';
  return primary?'+ GlacioTex Cooling Pillow Top upgrade available':'+ GlacioTex upgrade available';
}
function painPill(tier,primary){
  if(tier==='Elite')return primary?'+ ErgoAlign Contour Layer included':'+ ErgoAlign included';
  if(tier==='Luxe')return '+ Lumbar support included';
  return primary?'+ ErgoAlign Contour Layer upgrade available':'+ ErgoAlign upgrade available';
}

function buildCard(r,tier,badgeText,isPrimary,accOpen){
  var layers=LAYERS[r.base+'_'+tier]||[];
  var card=document.createElement('div');card.className='mat-card'+(isPrimary?' primary':'');
  var pImg=document.createElement('img');
  pImg.src=(tier==='Elite'?'Elite':r.base+'_'+tier)+'.jpg';
  pImg.alt=r.base+' '+tier;pImg.className='card-img';card.appendChild(pImg);
  var hdr=document.createElement('div');hdr.className='card-header';
  var topRow=document.createElement('div');topRow.className='card-top-row';
  var kicker=document.createElement('div');kicker.className='card-kicker';kicker.textContent=isPrimary?'Your Perfect Match:':'You May Also Like:';
  var badge=document.createElement('span');badge.className='badge '+(isPrimary?'badge-primary':'badge-secondary');badge.textContent=badgeText;
  topRow.appendChild(kicker);topRow.appendChild(badge);
  var nameEl=document.createElement('div');nameEl.className='card-name';nameEl.innerHTML='Helix '+r.base+' <em>'+tier+'</em>';
  var starsRow=document.createElement('div');starsRow.className='stars-row';
  starsRow.innerHTML='<span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span><span class="review-link">10,000 Reviews</span>';
  hdr.appendChild(topRow);hdr.appendChild(nameEl);hdr.appendChild(starsRow);card.appendChild(hdr);
  var whySec=document.createElement('div');whySec.className='why-section';
  var whyHead=document.createElement('div');whyHead.className='why-head';whyHead.textContent="Why You'll Love It:";whySec.appendChild(whyHead);
  function addWhy(label,desc,pill,pStyle){
    var item=document.createElement('div');item.className='why-item';
    var icon=document.createElement('div');icon.className='wi-icon';icon.innerHTML='<svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>';
    var txt=document.createElement('div');
    var t=document.createElement('div');t.className='wi-title';t.textContent=label;
    var d=document.createElement('div');d.className='wi-desc';d.textContent=desc;
    txt.appendChild(t);txt.appendChild(d);
    if(pill){var p=document.createElement('span');p.setAttribute('style',pStyle);p.textContent=pill;txt.appendChild(p);}
    item.appendChild(icon);item.appendChild(txt);whySec.appendChild(item);
  }
  var fc=getCopy(r.base,tier,'Firmness',r.q2);if(fc)addWhy(fc.label,fc.desc);
  var pc=getCopy(r.base,tier,'Position',posKey(r.q1));if(pc)addWhy(pc.label,pc.desc);
  if(r.showTemp){var tc=getCopy(r.base,tier,'Temperature',r.q4);if(tc)addWhy(tc.label,tc.desc,tempPill(tier,isPrimary),isPrimary?pillGrad:pillLight);}
  if(r.showBackPain){var bc=getCopy(r.base,tier,'BackPain',r.q3);if(bc)addWhy(bc.label,bc.desc,painPill(tier,isPrimary),isPrimary?pillGrad:pillLight);}
  if(r.showBudget&&tier==='Elite'){var bu=getCopy(r.base,'Elite','Budget','I want the best of the best');if(bu)addWhy(bu.label,bu.desc);}
  card.appendChild(whySec);
  var cid='acc_'+tier+'_'+Math.random().toString(36).slice(2,7);
  var toggle=document.createElement('div');toggle.className='acc-toggle';
  var lbl=document.createElement('span');lbl.id='albl-'+cid;lbl.textContent=accOpen?'Hide Construction Details':'View Construction Details';
  var arr=document.createElement('span');arr.className='acc-arrow';arr.id='aarr-'+cid;arr.innerHTML='&#8964;';arr.style.transform=accOpen?'rotate(180deg)':'none';
  toggle.appendChild(lbl);toggle.appendChild(arr);toggle.onclick=function(){toggleAcc(cid);};card.appendChild(toggle);
  var accBody=document.createElement('div');accBody.className=accOpen?'acc-body open':'acc-body';accBody.id=cid;
  var profEl=document.createElement('div');profEl.className='acc-profile';profEl.textContent=PROFILES[tier]||'';accBody.appendChild(profEl);
  var rImg=document.createElement('img');rImg.src=(tier==='Elite'?'Elite':r.base+'_'+tier)+'_layers.png';rImg.alt='layers';rImg.className='layer-img';accBody.appendChild(rImg);
  layers.forEach(function(l,i){
    var lay=document.createElement('div');lay.className='acc-layer';
    var ln=document.createElement('div');ln.className='acc-layer-name';ln.textContent=(i+1)+'. '+l.n;
    var ld=document.createElement('div');ld.className='acc-layer-desc';ld.textContent=l.d;
    lay.appendChild(ln);lay.appendChild(ld);accBody.appendChild(lay);
  });
  card.appendChild(accBody);
  var trust=document.createElement('div');trust.className='trust-row';
  trust.innerHTML='<div class="trust-item"><span class="trust-val">120 Nights</span><span class="trust-label">Risk-free trial</span></div><div class="trust-item"><span class="trust-val">Free</span><span class="trust-label">Shipping &amp; returns</span></div><div class="trust-item"><span class="trust-val">Limited</span><span class="trust-label">Lifetime warranty</span></div>';
  card.appendChild(trust);
  var price=document.createElement('div');price.className='price-row';
  price.innerHTML='<div><span class="price-starting">Starting at</span><span class="price-main">Queen: $1,649.75</span><span class="price-was">($1,373.75)</span></div><div class="price-right"><button class="shop-btn">Shop Now</button><span class="price-link">Pricing Details</span></div>';
  card.appendChild(price);
  return card;
}

function toggleAcc(id){
  var body=document.getElementById(id);var open=body.classList.toggle('open');
  document.getElementById('albl-'+id).textContent=open?'Hide Construction Details':'View Construction Details';
  document.getElementById('aarr-'+id).style.transform=open?'rotate(180deg)':'none';
}

function showResult(){
  lastResult=calcResult();
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('res-headline').innerHTML='Helix '+lastResult.base+' <em>'+lastResult.tier+'</em>';
  var r=lastResult;
  var order=r.tier==='Luxe'?['Luxe','Elite','Core']:r.tier==='Elite'?['Elite','Luxe','Core']:['Core','Luxe','Elite'];
  var badges={Luxe:'Best Match',Elite:'Most Luxurious',Core:'Best Value'};
  var row=document.getElementById('cards-row');row.innerHTML='';
  order.forEach(function(t,i){row.appendChild(buildCard(r,t,i===0?'Best Match':badges[t],i===0,i===0));});
}

function restart(){
  Object.keys(answers).forEach(function(k){delete answers[k];});
  cur=0;lastResult=null;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='flex';
  render();
}
render();
</script>
