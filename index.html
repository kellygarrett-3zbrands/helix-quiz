<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;min-height:100vh;background:linear-gradient(160deg,#EAEAEA 16%,#A3B8CB 92%);color:#2E3339}

/* HEADER */
.hdr{background:linear-gradient(160deg,#EAEAEA 16%,#A3B8CB 92%);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #fff;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.logo-text{font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:800;letter-spacing:.25em;color:#002E66}
.close-btn{width:34px;height:34px;border-radius:50%;background:#002E66;border:none;cursor:pointer;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif}

/* QUIZ */
#quiz-screen{display:flex;flex-direction:column;min-height:calc(100vh - 57px)}
.quiz-body{flex:1;display:flex;gap:40px;align-items:flex-start;justify-content:center;padding:52px 32px;max-width:1000px;margin:0 auto;width:100%}
.q-panel{background:#fff;border-radius:14px;padding:28px 24px;width:340px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-counter{font-size:12px;font-weight:600;color:#444;margin-bottom:8px}
.prog-track{height:5px;background:#e2e8f0;border-radius:3px;margin-bottom:22px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#002E66 0%,#A3B8CB 100%);transition:width .35s}
.q-title{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:10px;color:#2E3339}
.q-sub{font-size:13px;font-weight:400;color:#444;line-height:1.55;margin-bottom:20px}
.q-footer-divider{border-top:1px solid #f1f1f1;padding-top:14px;display:flex;gap:18px}
.q-footer-link{font-size:12px;font-weight:700;color:#002E66;cursor:pointer}

.opts-panel{flex:1;display:flex;flex-direction:column;gap:10px;padding-top:4px}
.opt-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.opt-card:hover{border-color:#A3B8CB}
.opt-card.selected{border-color:#002E66}
.opt-title{font-size:14px;font-weight:700;color:#2E3339;margin-bottom:2px}
.opt-desc{font-size:12px;font-weight:400;color:#444;line-height:1.4}
.opt-box{width:20px;height:20px;border-radius:4px;border:1.5px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt-card.selected .opt-box{background:#002E66;border-color:#002E66}
.chk{display:none}
.opt-card.selected .chk{display:block}

/* BOTTOM NAV */
.bottom-nav{background:linear-gradient(160deg,#EAEAEA 16%,#A3B8CB 92%);border-top:1.5px solid #fff;padding:14px 24px;display:flex;justify-content:center;align-items:center;gap:10px;position:sticky;bottom:0}
.btn-back{height:44px;padding:0 20px;border-radius:11px;border:none;background:#fff;cursor:pointer;font-size:20px;color:#002E66;display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif;font-weight:400;min-width:52px}
.btn-back:disabled{opacity:.3;cursor:not-allowed}
.btn-next{background:#fff;color:#002E66;border:none;border-radius:11px;padding:0 48px;height:44px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif}
.btn-next:disabled{opacity:.3;cursor:not-allowed}

/* RESULT */
#result-screen{display:none;min-height:calc(100vh - 57px);padding-bottom:80px}
.result-inner{max-width:980px;margin:0 auto;width:100%}
.result-top{padding:28px 28px 6px}
.result-kicker{font-size:13px;font-weight:400;color:#444;margin-bottom:3px}
.result-headline{font-size:30px;font-weight:800;color:#2E3339}
.result-headline em{font-family:'Libre Baskerville',serif;font-style:italic;font-weight:400}

.variant-bar{display:flex;gap:8px;padding:10px 28px 14px}
.vtab{padding:7px 18px;border-radius:20px;border:1.5px solid #002E66;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#002E66}
.vtab.active{background:#002E66;color:#fff;border-color:#002E66}

.cards-row{display:flex;gap:14px;padding:0 28px 20px;overflow-x:auto;align-items:flex-start}

/* CARDS */
.mat-card{background:#fff;border-radius:14px;flex:0 0 295px;overflow:hidden;border:2px solid #e2e8f0;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.mat-card.primary{border-color:#002E66}
.card-img{width:100%;height:170px;object-fit:cover;background:#e8ecf0;display:block}
.card-img-ph{width:100%;height:170px;background:linear-gradient(180deg,#d4dce6,#b8c8d8);display:flex;align-items:center;justify-content:center;font-size:11px;color:#7a8fa3;font-style:italic;font-family:'Nunito Sans',sans-serif}

.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.badge-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:.02em;font-family:'Nunito Sans',sans-serif}
.badge-primary{background:linear-gradient(90deg,#81ADDA 0%,#2E3339 100%);color:#fff}
.badge-secondary{background:#f1f1f1;color:#444}

.card-kicker{font-size:11px;font-weight:400;color:#444;margin-bottom:1px}
.card-name{font-size:20px;font-weight:800;color:#2E3339;line-height:1.15}
.card-name em{font-family:'Libre Baskerville',serif;font-style:italic;font-weight:400;color:#2E3339}
.stars-row{display:flex;align-items:center;gap:5px;font-size:13px}
.stars{color:#f59e0b;letter-spacing:1px}
.review-link{font-size:12px;font-weight:600;color:#002E66;text-decoration:underline;cursor:pointer}

.why-head{font-size:13px;font-weight:700;color:#2E3339;margin-bottom:6px}
.why-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:9px}
.wi-icon{width:22px;height:22px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.wi-icon svg{width:11px;height:11px}
.wi-title{font-size:13px;font-weight:700;color:#2E3339;line-height:1.3}
.wi-desc{font-size:12px;font-weight:400;color:#444;line-height:1.45;margin-top:1px}
.feat-label{font-size:11px;font-weight:700;color:#2E3339;margin-top:5px;margin-bottom:3px}
.feat-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:default;line-height:1;font-family:'Nunito Sans',sans-serif}
.fp-gradient{background:linear-gradient(90deg,#81ADDA 0%,#2E3339 100%);color:#fff}
.fp-light{background:#f1f1f1;border:1px solid #e2e8f0;color:#2E3339}

/* ACCORDION */
.acc-wrap{padding:0 16px 14px;border-top:1px solid #f1f1f1;padding-top:0}
.acc-toggle{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;font-size:12px;font-weight:700;color:#2E3339;cursor:pointer;background:#fafafa;user-select:none;border:1px solid #e2e8f0;border-radius:8px;margin:12px 0 0}
.acc-toggle.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
.acc-arrow{font-size:12px;color:#444;transition:transform .2s}
.acc-body{display:none;background:#fff;border:1px solid #e2e8f0;border-top:none;border-bottom-left-radius:8px;border-bottom-right-radius:8px;overflow:hidden}
.acc-body.open{display:block}
.acc-profile{font-size:11px;font-weight:600;color:#444;padding:8px 12px 4px}
.acc-render{width:100%;display:block;border-bottom:1px solid #f1f1f1}
.acc-render-ph{width:100%;height:120px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8;border-bottom:1px solid #f1f1f1;font-family:'Nunito Sans',sans-serif}
.acc-layer{padding:6px 12px;border-bottom:1px solid #f8f8f8}
.acc-layer:last-child{border-bottom:none}
.acc-layer-name{font-size:12px;font-weight:700;color:#2E3339;margin-bottom:1px}
.acc-layer-desc{font-size:11px;font-weight:400;color:#444;line-height:1.4}

/* TRUST + PRICE */
.trust-row{display:flex;justify-content:space-between;padding:10px 16px;border-top:1px solid #f1f1f1;background:#fafafa}
.trust-item{text-align:center}
.trust-val{font-size:11px;font-weight:700;color:#2E3339;display:block}
.trust-label{font-size:10px;font-weight:400;color:#444;display:block;margin-top:1px}

.price-row{padding:12px 16px;border-top:1px solid #f1f1f1;display:flex;justify-content:space-between;align-items:flex-start}
.price-left{}
.price-starting{font-size:10px;font-weight:400;color:#444;display:block;margin-bottom:2px}
.price-main{font-size:15px;font-weight:800;color:#2E3339;display:block}
.price-was{font-size:11px;font-weight:400;color:#94a3b8;text-decoration:line-through;display:block;margin-top:1px}
.price-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.shop-btn{background:#002E66;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;white-space:nowrap}
.price-link{font-size:11px;font-weight:600;color:#002E66;text-decoration:underline;cursor:pointer;text-align:right}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo-wrap">
    <svg width="32" height="28" viewBox="0 0 40 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="38" height="32" rx="1" stroke="#002E66" stroke-width="2.2" fill="none"/>
      <line x1="1" y1="12" x2="39" y2="12" stroke="#002E66" stroke-width="2.2"/>
      <line x1="1" y1="22" x2="39" y2="22" stroke="#002E66" stroke-width="2.2"/>
    </svg>
    <span class="logo-text">HELIX</span>
  </div>
  <button class="close-btn" onclick="restart()">✕</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-body">
    <div class="q-panel">
      <div class="q-counter" id="q-counter">Question 1 of 5</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:20%"></div></div>
      <div class="q-title" id="q-title"></div>
      <div class="q-sub" id="q-sub"></div>
      <div class="q-footer-divider">
        <span class="q-footer-link">&#128172; Chat</span>
        <span class="q-footer-link">⊞ Compare</span>
        <span class="q-footer-link">&#8681; Save</span>
      </div>
    </div>
    <div class="opts-panel" id="opts-panel"></div>
  </div>
  <div class="bottom-nav">
    <button class="btn-back" id="btn-back" onclick="goBack()" disabled>&#8249;</button>
    <button class="btn-next" id="btn-next" onclick="goNext()" disabled>Next</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-inner">
  <div class="result-top">
    <div class="result-kicker">Your Perfect Mattress Match:</div>
    <div class="result-headline" id="res-headline"></div>
  </div>
  <div class="variant-bar">
    <div class="vtab active" onclick="setVariant('A',this)">Version A — Spec language</div>
    <div class="vtab" onclick="setVariant('B',this)">Version B — Plain language</div>
  </div>
  <div class="cards-row" id="cards-row"></div>
  </div>
  <div class="bottom-nav" style="position:fixed;bottom:0;left:0;right:0">
    <button class="btn-back" onclick="restart()" style="opacity:1">&#8249;</button>
    <button class="btn-next" onclick="restart()">Retake quiz</button>
  </div>
</div>

<script>
const Qs=[
  {id:'q1',title:'What\'s your primary sleep position?',sub:'Your sleep position helps us find which mattress will give you the best support where you need it most.',opts:[
    {val:'Side',label:'Side sleeper',desc:'You spend most of the night on your side.'},
    {val:'Back',label:'Back sleeper',desc:'You spend most of the night on your back.'},
    {val:'Stomach',label:'Stomach sleeper',desc:'You spend most of the night on your stomach.'},
    {val:'Toss and Turn',label:'Combination sleeper',desc:'You move around throughout the night.'}
  ]},
  {id:'q2',title:'What type of mattress feel do you prefer?',sub:'Your feel preference plays a role in how soft or firm the top of your perfect mattress will be.',opts:[
    {val:'Soft',label:'Soft feel',desc:'Soft top of your mattress that lets you sink in like a cloud.'},
    {val:'Medium',label:'Medium feel',desc:'Balanced feel for the top of your mattress with a little give.'},
    {val:'Firm',label:'Firm feel',desc:'Firm top of your mattress with no sink or give.'}
  ]},
  {id:'q3',title:'How often do you wake up with back pain?',sub:'This helps us identify whether you need additional lumbar support built into your mattress.',opts:[
    {val:'Rarely',label:'Rarely',desc:'Back pain isn\'t something I typically deal with.'},
    {val:'Sometimes',label:'Sometimes',desc:'I occasionally wake up with some stiffness or discomfort.'},
    {val:'Often',label:'Often',desc:'Back pain is a regular issue that affects my sleep.'}
  ]},
  {id:'q4',title:'How often do you sleep hot?',sub:'Temperature regulation can make a big difference in sleep quality. We\'ll match you accordingly.',opts:[
    {val:'Every night',label:'Every night',desc:'I always overheat during sleep.'},
    {val:'Most nights',label:'Most nights',desc:'I sleep hot more often than not.'},
    {val:'Sometimes',label:'Sometimes',desc:'I occasionally wake up too warm.'},
    {val:'Rarely',label:'Rarely',desc:'Temperature isn\'t usually an issue for me.'},
    {val:'I typically sleep cold',label:'I sleep cold',desc:'I tend to get cold rather than hot at night.'}
  ]},
  {id:'q5',title:'What matters most to you in a mattress?',sub:'This helps us match you to the right tier — from our everyday essential to our most premium build.',opts:[
    {val:'I want the best of the best',label:'I want the best of the best',desc:'Give me the most premium option available, no compromises.'},
    {val:'I want good quality but it doesn\'t have to be the fanciest',label:'Good quality without the extras',desc:'I want a great mattress without needing the top of the line.'}
  ]}
];

const answers={};
let cur=0,variant='A',lastResult=null;

function render(){
  const q=Qs[cur];
  document.getElementById('q-counter').textContent=`Question ${cur+1} of ${Qs.length}`;
  document.getElementById('prog-fill').style.width=`${((cur+1)/Qs.length)*100}%`;
  document.getElementById('q-title').textContent=q.title;
  document.getElementById('q-sub').textContent=q.sub;
  const panel=document.getElementById('opts-panel');
  panel.innerHTML='';
  q.opts.forEach(o=>{
    const d=document.createElement('div');
    d.className='opt-card'+(answers[q.id]===o.val?' selected':'');
    d.innerHTML=`<div><div class="opt-title">${o.label}</div><div class="opt-desc">${o.desc}</div></div><div class="opt-box"><svg class="chk" viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    d.onclick=()=>{answers[q.id]=o.val;render();};
    panel.appendChild(d);
  });
  document.getElementById('btn-back').disabled=cur===0;
  document.getElementById('btn-next').disabled=!answers[q.id];
  document.getElementById('btn-next').textContent=cur===Qs.length-1?'See my result':'Next';
}

function goNext(){if(!answers[Qs[cur].id])return;cur<Qs.length-1?(cur++,render()):showResult();}
function goBack(){if(cur>0){cur--;render();}}

function calcResult(){
  const{q1,q2,q3,q4,q5}=answers;
  const tier=q5==='I want the best of the best'?'Elite':q3==='Often'?'Luxe':'Core';
  const pos=['Side','Toss and Turn'].includes(q1)?'side':'back';
  const base={side:{Soft:'Sunset',Medium:'Midnight',Firm:'Twilight'},back:{Soft:'Moonlight',Medium:'Dusk',Firm:'Dawn'}}[pos][q2];
  return{tier,base,q1,q2,q3,q4,q5,
    showTemp:['Every night','Most nights','Sometimes'].includes(q4),
    showBackPain:['Sometimes','Often'].includes(q3)};
}

const LAYERS={
  Luxe:[
    {n:'Customizable Top Layer',d:'Comes with our super soft, ultra-smooth Tencel Cover, or upgrade to our GlacioTex Cooling Cover.'},
    {n:'Premium Comfort Layer',d:'Exclusive Copper Gel Memory Foam cushions and supports your body for a cooling, cozy feel.'},
    {n:'Ultra-Supportive Memory Foam Layer',d:'Ultra-high density Supreme Support Memory Foam with 4× the long-lasting, cradling comfort.'},
    {n:'Custom Firmness Layer',d:'Helix Premium Responsive Foam made for your feel preference, balancing cushioning and support.'},
    {n:'Position Support Layer',d:'Helix Premium Responsive Foam providing pressure relief across the shoulders and hips.'},
    {n:'Enhanced Lumbar Support Layer',d:'Up to 1,000 individually wrapped coils with reinforced support under the hip and full perimeter.'},
    {n:'Durable, Stable Base Layer',d:'DuraDense Foam secures and supports the layers above for a longer lasting mattress.'}
  ],
  Elite:[
    {n:'Cutting-Edge Cooling Top Layer',d:'Innovative heat conductive fabric draws heat away from the surface of the mattress.'},
    {n:'CoolForce™ Cooling Layer',d:'Five graphite ribbons pull 22% more heat away for 12+ hours. Included on Elite.'},
    {n:'Luxurious Comfort Layer',d:'Copper Gel Memory Foam poured in our Arizona facility. Naturally cooling and cozy.'},
    {n:'Ultra-Supportive Memory Foam Layer',d:'SupremeSupport 7.0 Memory Foam with 7× the cushioning of standard foam.'},
    {n:'Superior Pressure Distribution Layer',d:'Individually wrapped steel microcoils for stability, pressure distribution, and motion isolation.'},
    {n:'Custom Firmness Layer',d:'Helix Premium Responsive Foam custom-created for your feel preference.'},
    {n:'Position Support Layer',d:'Premium Responsive Foam specifically for your sleep position.'},
    {n:'Deluxe Lumbar Support Layer',d:'Up to 1,000 individually wrapped coils with reinforced hip support and full perimeter reinforcement.'},
    {n:'Durable, Stable Base Layer',d:'DuraDense Foam secures and supports the layers above for lasting durability.'}
  ],
  Core:[
    {n:'Comfortable Top Layer',d:'Breathe Knit Cover promotes airflow and reduces heat buildup.'},
    {n:'Premium Comfort Layer',d:'Exclusive Copper Gel Memory Foam cushions and supports for a cooling, cozy feel.'},
    {n:'Ultra-Supportive Memory Foam Layer',d:'SupremeSupport 2.5 Memory Foam feels comfortable and relaxing.'},
    {n:'Custom Firmness Layer',d:'Premium Responsive Foam created for your feel preference.'},
    {n:'Position Support Layer',d:'Helix Premium Responsive Foam for pressure relief across your sleep position.'},
    {n:'Premium Support Layer',d:'Extra-stable DuraDense Foam secures and supports all layers.'},
    {n:'Durable, Stable Base Layer',d:'DuraDense Foam secures the layers above for long-lasting durability.'}
  ]
};
const PROFILES={Core:'11" profile',Luxe:'13.5" profile',Elite:'15" profile'};

const specWhy={
  feel:{Soft:'Progressive soft comfort with pressure-relieving memory foam layers.',Medium:'The goldilocks option: not too firm or too soft.',Firm:'Firm support with high-density foam core and reinforced edges.'},
  pos:'Works hand-in-hand with other layers to provide pressure support across the shoulders and hips.',
  tempDesc:'Optional GlacioTex Cooling Cover & CoolForce Layer are scientifically proven to pull 22% more heat away from the body to keep you cool continuously for over 12 hours.',
  tempLabel:'Cooling Technology',
  backDesc:'Additional hip support designed to prevent lower back sagging for those who experience regular lower back discomfort and pain.',
  backLabel:'Zoned Lumbar Support'
};
const plainWhy={
  feel:{Soft:'Soft and cozy — you sink in like a cloud.',Medium:'Right in the middle — not too firm, not too soft.',Firm:'Solid support. You sleep on top of the mattress, not in it.'},
  pos:'The mattress is built specifically for how you sleep, so you wake up comfortable.',
  tempDesc:'This mattress is built to keep you cool all night — not just for an hour.',
  tempLabel:'Stays cool all night',
  backDesc:'Extra support where your lower back needs it most, so you wake up feeling better.',
  backLabel:'Back pain support'
};

const posLabel={Side:'a side sleeper',Back:'a back sleeper',Stomach:'a stomach sleeper','Toss and Turn':'a combination sleeper'};
const posLabelPlain={Side:'on your side',Back:'on your back',Stomach:'on your stomach','Toss and Turn':'all over the place'};

function buildCard(r,cardTier,badgeText,isPrimary,v,accOpen){
  const spec=v==='A';
  const W=spec?specWhy:plainWhy;
  const layers=LAYERS[cardTier]||LAYERS.Core;
  const profile=PROFILES[cardTier]||'';
  const cid=`acc_${cardTier}_${Math.random().toString(36).slice(2,7)}`;
  const imgKey=cardTier==='Elite'?'Elite':`${r.base}_${cardTier}`;
  const renderKey=`${imgKey}_layers`;

  const feelTitle=spec?`You Prefer A ${r.q2} Feel`:`You Like A ${r.q2} Feel`;
  const posTitle=spec?`You Said You Are ${posLabel[r.q1]}`:`You Sleep ${posLabelPlain[r.q1]}`;

  let whyHtml=`
    <div class="why-item">
      <div class="wi-icon"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="wi-text"><div class="wi-title">${feelTitle}</div><div class="wi-desc">${W.feel[r.q2]}</div></div>
    </div>
    <div class="why-item">
      <div class="wi-icon"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="wi-text"><div class="wi-title">${posTitle}</div><div class="wi-desc">${W.pos}</div></div>
    </div>`;

  if(r.showTemp){
    const pillText=isPrimary
      ?(spec?'+ GlacioTex + CoolForce™ Available as Upgrades':'+ Cooling upgrades available')
      :(spec?'+ GlacioTex + CoolForce™ Available as Upgrades':'+ Cooling upgrades available');
    whyHtml+=`
    <div class="why-item">
      <div class="wi-icon"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="wi-text">
        <div class="wi-title">${spec?`You Sleep Hot ${r.q4}`:'You tend to sleep hot'}</div>
        <div class="wi-desc">${W.tempDesc}</div>
        <div class="feat-label">${W.tempLabel}</div>
        <span class="feat-pill ${isPrimary?'fp-gradient':'fp-light'}">${pillText}</span>
      </div>
    </div>`;
  }

  if(r.showBackPain){
    const pillText=isPrimary
      ?(spec?'+ Optional ErgoAlign Upgrade':'+ Back support upgrade available')
      :(spec?'+ Optional ErgoAlign Upgrade':'+ Back support upgrade available');
    whyHtml+=`
    <div class="why-item">
      <div class="wi-icon"><svg viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,9 11,1" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="wi-text">
        <div class="wi-title">${spec?'You Said You Wake Up With Back Pain':'You deal with back pain'}</div>
        <div class="wi-desc">${W.backDesc}</div>
        <div class="feat-label">${W.backLabel}</div>
        <span class="feat-pill ${isPrimary?'fp-gradient':'fp-light'}">${pillText}</span>
      </div>
    </div>`;
  }

  const layerHtml=layers.map((l,i)=>`<div class="acc-layer"><div class="acc-layer-name">${i+1}. ${l.n}</div><div class="acc-layer-desc">${l.d}</div></div>`).join('');

  return `
  <div class="mat-card${isPrimary?' primary':''}">
    <div class="card-img-ph">[ ${r.base} ${cardTier} image ]</div>
    <div class="card-body">
      <div class="badge-row">
        <span class="badge ${isPrimary?'badge-primary':'badge-secondary'}">${badgeText}</span>
      </div>
      <div>
        <div class="card-kicker">${isPrimary?'Your Perfect Match:':'You May Also Like:'}</div>
        <div class="card-name">Helix ${r.base} <em>${cardTier}</em></div>
      </div>
      <div class="stars-row"><span class="stars">★★★★★</span><span class="review-link">10,000 Reviews</span></div>
      <div>
        <div class="why-head">Why You'll Love It:</div>
        ${whyHtml}
      </div>
    </div>
    <div class="acc-wrap">
      <div class="acc-toggle${accOpen?' open':''}" id="acc-btn-${cid}" onclick="toggleAcc('${cid}',this)">
        <span id="acc-label-${cid}">${accOpen?'Hide Construction Details':'View Construction Details'}</span>
        <span class="acc-arrow" id="acc-arr-${cid}" style="transform:${accOpen?'rotate(180deg)':'rotate(0deg)'}">&#8964;</span>
      </div>
      <div class="acc-body${accOpen?' open':''}" id="${cid}">
        <div class="acc-profile">${profile}</div>
        <div class="acc-render-ph">[ ${renderKey} render image ]</div>
        ${layerHtml}
      </div>
    </div>
    <div class="trust-row">
      <div class="trust-item"><span class="trust-val">120 Nights</span><span class="trust-label">Risk-free trial</span></div>
      <div class="trust-item"><span class="trust-val">Free</span><span class="trust-label">Shipping &amp; returns</span></div>
      <div class="trust-item"><span class="trust-val">Limited</span><span class="trust-label">Lifetime warranty</span></div>
    </div>
    <div class="price-row">
      <div class="price-left">
        <span class="price-starting">Starting at</span>
        <span class="price-main">Queen: $1,649.75</span>
        <span class="price-was">($1,373.75)</span>
      </div>
      <div class="price-right">
        <button class="shop-btn">Shop Now</button>
        <span class="price-link">Pricing Details</span>
      </div>
    </div>
  </div>`;
}

function toggleAcc(id,el){
  const body=document.getElementById(id);
  const open=body.classList.toggle('open');
  el.classList.toggle('open',open);
  document.getElementById('acc-label-'+id).textContent=open?'Hide Construction Details':'View Construction Details';
  document.getElementById('acc-arr-'+id).style.transform=open?'rotate(180deg)':'rotate(0deg)';
}

function showResult(){
  lastResult=calcResult();
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  renderResult();
}

function renderResult(){
  const r=lastResult;
  document.getElementById('res-headline').innerHTML=`Helix ${r.base} <em>${r.tier}</em>`;
  const order=r.tier==='Luxe'?['Luxe','Elite','Core']:r.tier==='Elite'?['Elite','Luxe','Core']:['Core','Luxe','Elite'];
  const badges={Luxe:'Best Match',Elite:'Most Luxurious',Core:'Best Value'};
  document.getElementById('cards-row').innerHTML=order.map((t,i)=>
    buildCard(r,t,badges[t],i===0,variant,i===0)
  ).join('');
}

function setVariant(v,el){
  variant=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(lastResult)renderResult();
}

function restart(){
  Object.keys(answers).forEach(k=>delete answers[k]);
  cur=0;lastResult=null;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='flex';
  render();
}

render();
</script>
</body>
</html>
